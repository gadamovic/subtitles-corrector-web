name: Setup ansible
description: "Sets up SSH, Ansible Vault, and installs Ansible"
inputs:
  ssh_private_key:
    description: "SSH private key of the Ansible user"
    required: true
  vault_password:
    description: "Ansible vault password"
    required: true
runs:
  using: "composite"
  steps:
  - name: Setup SSH key
    shell: bash
    run: |
      mkdir -p ~/.ssh
      echo "${{ inputs.ssh_private_key }}" > ~/.ssh/id_rsa.pem
      chmod 600 ~/.ssh/id_rsa.pem

  - name: Add EC2 host key
    shell: bash
    run: |
      ssh-keyscan -H 13.61.96.166 >> ~/.ssh/known_hosts

  - name: Setup Ansible Vault
    shell: bash
    run: |
      mkdir -p ~/ansible-vault/
      echo "${{ inputs.vault_password }}" > ~/ansible-vault/password
      chmod 600 ~/ansible-vault/password

  - name: Install Compatible Ansible
    shell: bash
    run: |
      python -m pip install --upgrade pip
      # 2.14.x is the last version that fully supports the older
      # Python 3.7/3.8 environments
      pip install "ansible-core==2.14.11" ansible