name: Certificates check

on:
  schedule:
    - cron: 0 0 * * MON
  workflow_dispatch:

jobs:
  check-certs:
    name: Check tls certificates and update if needed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Compatible Ansible
        run: |
          python -m pip install --upgrade pip
          # 2.14.x is the last version that fully supports the older
          # Python 3.7/3.8 environments
          pip install "ansible-core==2.14.11" ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PROD_SSH_PRIV_KEY }}" > ~/.ssh/id_rsa.pem
          chmod 600 ~/.ssh/id_rsa.pem

      - name: Add EC2 host key
        run: |
          ssh-keyscan -H 13.61.96.166 >> ~/.ssh/known_hosts

      - name: Setup Ansible Vault
        run: |
          mkdir -p ~/ansible-vault/
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/ansible-vault/password
          chmod 600 ~/ansible-vault/password

      - name: Check using Ansible
        run: |
          cd $GITHUB_WORKSPACE/ansible
          ansible-playbook -i $GITHUB_WORKSPACE/ansible/inventory/hosts $GITHUB_WORKSPACE/ansible/playbooks/check_tls_certificates.yml --vault-password-file ~/ansible-vault/password
          